services:
  # ==================== DATABASES ====================
  
  auth-db:
    image: postgres:15
    container_name: auth-db
    environment:
      POSTGRES_USER: sportshop
      POSTGRES_PASSWORD: sportshop
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportshop -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  product-db:
    image: postgres:15
    container_name: product-db
    environment:
      POSTGRES_USER: sportshop
      POSTGRES_PASSWORD: sportshop
      POSTGRES_DB: product_db
    ports:
      - "5433:5432"
    volumes:
      - product-db-data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportshop -d product_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  order-db:
    image: postgres:15
    container_name: order-db
    environment:
      POSTGRES_USER: sportshop
      POSTGRES_PASSWORD: sportshop
      POSTGRES_DB: order_db
    ports:
      - "5434:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportshop -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==================== MICROSERVICES ====================

  auth:
    build: 
      context: .
      dockerfile: services/auth/Dockerfile
    container_name: auth-service
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://sportshop:sportshop@auth-db:5432/auth_db
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    depends_on:
      auth-db:
        condition: service_healthy
    restart: always
    volumes:
      - ./shared-types:/app/shared-types
    command: sh -c "npx prisma db push && node dist/index.js"

  product:
    build: 
      context: .
      dockerfile: services/product/Dockerfile
    container_name: product-service
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://sportshop:sportshop@product-db:5432/product_db
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    depends_on:
      product-db:
        condition: service_healthy
    restart: always
    volumes:
      - ./shared-types:/app/shared-types
    command: sh -c "npx prisma db push && npx prisma db seed && node dist/index.js"

  order:
    build: 
      context: .
      dockerfile: services/order/Dockerfile
    container_name: order-service
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: postgresql://sportshop:sportshop@order-db:5432/order_db
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    depends_on:
      order-db:
        condition: service_healthy
    restart: always
    volumes:
      - ./shared-types:/app/shared-types
    command: sh -c "npx prisma db push && node dist/main.js"

  api-gateway:
    build: ./services/api-gateway
    container_name: api-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - auth
      - product
      - order
    restart: always

  frontend:
    build:
      context: .
      dockerfile: frontend/classic-app/Dockerfile
    container_name: classic-frontend
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
    depends_on:
      - api-gateway
    restart: always
    volumes:
      - ./shared-types:/app/shared-types

  frontend-redux:
    build:
      context: .
      dockerfile: frontend/redux-app/Dockerfile
    container_name: redux-frontend
    ports:
      - "8081:80"
    environment:
      - NODE_ENV=production
    depends_on:
      - api-gateway
    restart: always

  frontend-mobx:
    build:
      context: .
      dockerfile: frontend/mobx-app/Dockerfile
    container_name: mobx-frontend
    ports:
      - "8082:80"
    environment:
      - NODE_ENV=production
    depends_on:
      - api-gateway
    restart: always

  mfe-catalog:
    build:
      context: .
      dockerfile: frontend/mfe-app/Dockerfile
    container_name: mfe-catalog
    command: sh -c "npm run dev -w @sportshop/mfe-catalog -- --host 0.0.0.0"
    ports:
      - "4201:4201"
    environment:
      - NODE_ENV=development
      - MFE_API_GATEWAY_URL=http://api-gateway:3000
      - MFE_PUBLIC_ORIGIN=http://localhost
    depends_on:
      - api-gateway
    restart: always

  mfe-orders:
    build:
      context: .
      dockerfile: frontend/mfe-app/Dockerfile
    container_name: mfe-orders
    command: sh -c "npm run dev -w @sportshop/mfe-orders -- --host 0.0.0.0"
    ports:
      - "4202:4202"
    environment:
      - NODE_ENV=development
      - MFE_API_GATEWAY_URL=http://api-gateway:3000
      - MFE_PUBLIC_ORIGIN=http://localhost
    depends_on:
      - api-gateway
    restart: always

  mfe-host:
    build:
      context: .
      dockerfile: frontend/mfe-app/Dockerfile
    container_name: mfe-host
    command: sh -c "npm run dev -w @sportshop/mfe-host -- --host 0.0.0.0"
    ports:
      - "8083:4200"
    environment:
      - NODE_ENV=development
      - MFE_API_GATEWAY_URL=http://api-gateway:3000
      - MFE_PUBLIC_ORIGIN=http://localhost
      - MFE_REMOTE_ORIGIN=http://localhost
    depends_on:
      - api-gateway
      - mfe-catalog
      - mfe-orders
    restart: always

volumes:
  auth-db-data:
  product-db-data:
  order-db-data:
