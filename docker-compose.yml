services:
  # ==================== DATABASES ====================
  
  auth-db:
    image: postgres:15
    container_name: auth-db
    environment:
      POSTGRES_USER: sportshop
      POSTGRES_PASSWORD: sportshop
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportshop -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  product-db:
    image: postgres:15
    container_name: product-db
    environment:
      POSTGRES_USER: sportshop
      POSTGRES_PASSWORD: sportshop
      POSTGRES_DB: product_db
    ports:
      - "5433:5432"
    volumes:
      - product-db-data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportshop -d product_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # order-db:
  #   image: postgres:15
  #   container_name: order-db
  #   environment:
  #     POSTGRES_USER: sportshop
  #     POSTGRES_PASSWORD: sportshop
  #     POSTGRES_DB: order_db
  #   ports:
  #     - "5434:5432"
  #   volumes:
  #     - order-db-data:/var/lib/postgresql/data
  #   restart: always
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U sportshop -d order_db"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5

  # ==================== MICROSERVICES ====================

  auth:
    build: 
      context: .
      dockerfile: services/auth/Dockerfile
    container_name: auth-service
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://sportshop:sportshop@auth-db:5432/auth_db
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    depends_on:
      auth-db:
        condition: service_healthy
    restart: always
    volumes:
      - ./shared-types:/app/shared-types

  product:
    build: 
      context: .
      dockerfile: services/product/Dockerfile
    container_name: product-service
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://sportshop:sportshop@product-db:5432/product_db
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    depends_on:
      product-db:
        condition: service_healthy
    restart: always
    volumes:
      - ./shared-types:/app/shared-types

  # order:
  #   build: ./services/order
